services:
  localstack:
    image: localstack/localstack:3
    container_name: sea-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,dynamodb,sns,sqs
      - AWS_DEFAULT_REGION=us-east-1
      - DEBUG=0
      - PERSISTENCE=1
    volumes:
      - "localstack-data:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "awslocal", "dynamodb", "list-tables"]
      interval: 5s
      timeout: 10s
      retries: 10

  localstack-setup:
    image: localstack/localstack:3
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_ENDPOINT_URL=http://localstack:4566
    entrypoint: >
      /bin/bash -c "
      echo 'Creating S3 bucket...' &&
      awslocal s3 mb s3://sea-uploads-dev || true &&

      echo 'Creating DynamoDB tables...' &&
      awslocal dynamodb create-table --table-name UploadFiles --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE --billing-mode PAY_PER_REQUEST || true &&
      awslocal dynamodb create-table --table-name ExtractedDocs --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE --billing-mode PAY_PER_REQUEST || true &&
      awslocal dynamodb create-table --table-name Transactions --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE --billing-mode PAY_PER_REQUEST || true &&
      awslocal dynamodb create-table --table-name AnalyticsSummaries --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE --billing-mode PAY_PER_REQUEST || true &&
      awslocal dynamodb create-table --table-name AnomalyDetections --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE --billing-mode PAY_PER_REQUEST || true &&
      awslocal dynamodb create-table --table-name Notifications --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE --billing-mode PAY_PER_REQUEST || true &&
      awslocal dynamodb create-table --table-name ChatConversations --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE --billing-mode PAY_PER_REQUEST || true &&
      awslocal dynamodb create-table --table-name Users --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE --billing-mode PAY_PER_REQUEST || true &&
      awslocal dynamodb create-table --table-name Workspaces --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE --billing-mode PAY_PER_REQUEST || true &&
      awslocal dynamodb create-table --table-name Sessions --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE --billing-mode PAY_PER_REQUEST || true &&

      echo 'Creating SNS topic...' &&
      TOPIC_ARN=$$(awslocal sns create-topic --name sea-events --query TopicArn --output text) &&

      echo 'Creating SQS queues...' &&
      awslocal sqs create-queue --queue-name sea-extraction-queue || true &&
      awslocal sqs create-queue --queue-name sea-transactions-queue || true &&
      awslocal sqs create-queue --queue-name sea-categorization-queue || true &&
      awslocal sqs create-queue --queue-name sea-analytics-queue || true &&
      awslocal sqs create-queue --queue-name sea-anomaly-queue || true &&
      awslocal sqs create-queue --queue-name sea-notifications-queue || true &&

      echo 'Subscribing queues to SNS...' &&
      awslocal sns subscribe --topic-arn $$TOPIC_ARN --protocol sqs --notification-endpoint arn:aws:sqs:us-east-1:000000000000:sea-extraction-queue || true &&
      awslocal sns subscribe --topic-arn $$TOPIC_ARN --protocol sqs --notification-endpoint arn:aws:sqs:us-east-1:000000000000:sea-transactions-queue || true &&
      awslocal sns subscribe --topic-arn $$TOPIC_ARN --protocol sqs --notification-endpoint arn:aws:sqs:us-east-1:000000000000:sea-categorization-queue || true &&
      awslocal sns subscribe --topic-arn $$TOPIC_ARN --protocol sqs --notification-endpoint arn:aws:sqs:us-east-1:000000000000:sea-analytics-queue || true &&
      awslocal sns subscribe --topic-arn $$TOPIC_ARN --protocol sqs --notification-endpoint arn:aws:sqs:us-east-1:000000000000:sea-anomaly-queue || true &&
      awslocal sns subscribe --topic-arn $$TOPIC_ARN --protocol sqs --notification-endpoint arn:aws:sqs:us-east-1:000000000000:sea-notifications-queue || true &&

      echo 'LocalStack fully initialized!'
      "
    restart: "no"

volumes:
  localstack-data: